# Video Transcriber Docker Compose 配置
# 基础配置，可通过 overlay 文件扩展：
#   开发: docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up
#   生产: docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d

services:
  video-transcriber:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      # GPU 构建 (需要 nvidia-container-toolkit):
      target: gpu
      # CPU 构建:
      # target: cpu
    container_name: video-transcriber
    restart: unless-stopped
    ports:
      - "8665:8665"
    volumes:
      - ../logs:/app/logs
      - ../temp:/app/temp
      - ../models_cache:/app/models_cache
      - ../.env:/app/.env:ro
    # GPU 设备透传
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # CPU 模式: 删除上方 deploy 块，并将 build.target 改为 cpu
    environment:
      # 服务配置
      - HOST=0.0.0.0
      - PORT=8665
      - DEBUG=false
      # 日志
      - LOG_LEVEL=INFO
      - LOG_TO_CONSOLE=true
      # SenseVoice 模型配置
      - DEFAULT_MODEL=sensevoice-small
      - DEFAULT_LANGUAGE=zh
      - ENABLE_GPU=true
      # CPU 模式: - ENABLE_GPU=false
      - MODEL_CACHE_DIR=/app/models_cache
      # 音频分块
      - ENABLE_AUDIO_CHUNKING=true
      - CHUNK_DURATION_SECONDS=300
      # 文件配置
      - TEMP_DIR=/app/temp
      - MAX_FILE_SIZE=1024
      - CLEANUP_AFTER=3600
      # API 配置
      - CORS_ORIGINS=*
      - RATE_LIMIT_PER_MINUTE=60
      # 任务配置
      - MAX_CONCURRENT_TASKS=3
      - TASK_TIMEOUT=3600
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8665/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - transcriber-net

networks:
  transcriber-net:
    driver: bridge
